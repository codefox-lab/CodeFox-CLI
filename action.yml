name: 'CodeFox AI Review'
author: 'CodeFox'
description: '🚀 AI-powered code security and quality audit'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  codefox-api-key:
    description: 'API Key for CodeFox service'
    required: true
  github-token:
    description: 'GitHub Token for posting comments'
    default: ${{ github.token }}
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install CodeFox
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/URLbug/CodeFox-CLI.git@dev_agents

    - name: Fetch base branch
      shell: bash
      run: |
        git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
        git fetch origin ${{ github.head_ref }}:${{ github.head_ref }}

    - name: Create CodeFox env
      shell: bash
      run: |
        echo "CODEFOX_API_KEY=${{ inputs.codefox-api-key }}" > .codefoxenv
        echo "GITHUB_TOKEN=${{ inputs.github-token }}" >> .codefoxenv
        echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .codefoxenv
        echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> .codefoxenv

    - name: Run CodeFox Scan
      shell: bash
      run: |
        codefox scan \
          --targetbranch ${{ github.base_ref }} \
          --sourcebranch ${{ github.head_ref }} \
          --ci