name: 'CodeFox AI Review'
author: 'CodeFox'
description: '🚀 AI-powered code security and quality audit'
branding:
  icon: 'shield'
  color: 'orange'

inputs:
  codefox-api-key:
    description: 'API key used to authenticate requests to the CodeFox service.'
    required: true

  codefox-branch:
    description: 'Git branch of the CodeFox repository to install and run.'
    default: 'main'
    required: false

  github-token:
    description: 'GitHub token used to authenticate with the GitHub API.'
    default: ${{ github.token }}
    required: false

runs:
  using: 'composite'
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Restore CodeFox cache
      uses: actions/cache@v4
      with:
        path: .codefox
        key: ${{ runner.os }}-codefox-${{ github.repository }}-${{ github.base_ref }}-${{ inputs.codefox-branch }}
        restore-keys: |
          ${{ runner.os }}-codefox-${{ github.repository }}-${{ github.base_ref }}-
          ${{ runner.os }}-codefox-${{ github.repository }}-
          ${{ runner.os }}-codefox-

    - name: Install CodeFox
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install git+https://github.com/URLbug/CodeFox-CLI.git@${{ inputs.codefox-branch }}

    - name: Fetch base branch
      shell: bash
      run: |
        git fetch origin ${{ github.base_ref }}:${{ github.base_ref }}
        git fetch origin ${{ github.head_ref }}:${{ github.head_ref }}

    - name: Create CodeFox env
      shell: bash
      run: |
        umask 077
        echo "CODEFOX_API_KEY=${{ inputs.codefox-api-key }}" > .codefoxenv
        echo "GITHUB_TOKEN=${{ inputs.github-token }}" >> .codefoxenv
        echo "GITHUB_REPOSITORY=${{ github.repository }}" >> .codefoxenv
        echo "PR_NUMBER=${{ github.event.pull_request.number }}" >> .codefoxenv

    - name: Run CodeFox Scan
      shell: bash
      run: |
        codefox scan \
          --target-branch ${{ github.base_ref }} \
          --source-branch ${{ github.head_ref }} \
          --ci